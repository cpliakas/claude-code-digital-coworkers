name: Version Check
on:
  push:
    paths:
      - 'plugins/*/.claude-plugin/plugin.json'
      - '.claude-plugin/marketplace.json'
  pull_request:
    paths:
      - 'plugins/*/.claude-plugin/plugin.json'
      - '.claude-plugin/marketplace.json'
jobs:
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check plugin version consistency
        run: python3 scripts/check-plugin-versions.py
