suite:
  name: "AWS Solutions Architect SAA-C03"
  description: "Tests aws-solutions-architect against 494 SAA-C03 exam scenarios"
  agent: "plugins/cloud-infra-aws/agents/aws-solutions-architect.md"
  dataset: "questions.json"

dataset_fields:
  id: "id"
  scenario: "scenario"
  expected_answer: "correct_answer"
  explanation: "explanation"

defaults:
  agent_model: "claude-haiku-4-5-20251001"
  judge_model: "claude-sonnet-4-5-20250929"

modes:
  direct:
    description: "Binary correct/incorrect answer check"
    agent_max_tokens: 512
    agent_prompt: |
      You are answering an AWS architecture question. Provide your recommended solution in 1-3 sentences. Be specific about which AWS services to use.

      Scenario:
      {scenario}

      Your recommendation:
    judge_prompt: |
      You are evaluating whether an AI agent's AWS recommendation matches the known correct answer for an exam-style question.

      Scenario: {scenario}

      Correct answer: {expected_answer}

      Agent's response: {response}

      Does the agent's recommendation align with the correct answer? The agent does not need to use identical wording, but must recommend the same core service(s) and approach.

      Respond with ONLY a JSON object:
      {{
        "correct": true/false,
        "confidence": 0.0-1.0,
        "explanation": "brief explanation of why it matches or not"
      }}
    scoring:
      type: "binary"
      correct_field: "correct"
      metrics:
        - name: "confidence"
          type: "float"
      text_fields:
        - "explanation"
    summary:
      show_failures: true
      max_failures_shown: 10

  reasoning:
    description: "Multi-dimension reasoning quality assessment"
    agent_max_tokens: 2048
    agent_prompt: |
      A team has brought you the following architecture scenario for review. Provide a Well-Architected review covering:
      1. Your recommended approach (specific AWS services)
      2. Which Well-Architected pillars are most relevant
      3. Risk classification (HRI/MRI/Informational) for any concerns
      4. Cost implications (include estimates or hidden costs if applicable)
      5. Tradeoffs between pillars
      6. What conditions would change your recommendation

      Scenario:
      {scenario}

      Your review:
    judge_prompt: |
      You are evaluating the quality of an AWS Solutions Architect agent's architectural review. Score each dimension 1-5.

      Scenario: {scenario}
      Correct answer: {expected_answer}
      Agent's review: {response}

      Score these dimensions:

      1. **answer_accuracy** (1-5): Does the recommendation match the correct answer?
      2. **right_sizing** (1-5): Did it consider workload size before recommending? Avoid over-engineering?
      3. **cost_surfacing** (1-5): Did it mention cost implications? Hidden costs?
      4. **specificity** (1-5): Did it name exact services, configurations, code patterns (not vague)?
      5. **pillar_coverage** (1-5): Did it identify relevant Well-Architected pillars and cross-pillar tradeoffs?
      6. **risk_classification** (1-5): Did it classify risks appropriately (HRI/MRI/Informational)?
      7. **structured_format** (1-5): Did it use a structured review format?

      Respond with ONLY a JSON object:
      {{
        "answer_accuracy": <1-5>,
        "right_sizing": <1-5>,
        "cost_surfacing": <1-5>,
        "specificity": <1-5>,
        "pillar_coverage": <1-5>,
        "risk_classification": <1-5>,
        "structured_format": <1-5>,
        "overall": <1.0-5.0>,
        "strengths": "brief note on what was done well",
        "weaknesses": "brief note on what was missed"
      }}
    scoring:
      type: "dimensional"
      dimensions:
        - "answer_accuracy"
        - "right_sizing"
        - "cost_surfacing"
        - "specificity"
        - "pillar_coverage"
        - "risk_classification"
        - "structured_format"
        - "overall"
      text_fields:
        - "strengths"
        - "weaknesses"
    summary:
      primary_dimension: "overall"
      weakness_keywords:
        - "cost"
        - "tradeoff"
        - "risk"
        - "format"
        - "specific"
        - "pillar"
        - "generic"
        - "vague"
